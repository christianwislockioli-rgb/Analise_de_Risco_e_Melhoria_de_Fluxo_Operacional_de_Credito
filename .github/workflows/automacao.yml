name: Executar Radar de Mercado

on:
  schedule:
    - cron: '0 8 * * 1-5' # Roda às 08h00 UTC (05h00 no horário de Brasília), de segunda a sexta
  workflow_dispatch: # Permite rodar manualmente pelo site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Bibliotecas
      run: |
        pip install pandas yfinance requests

    - name: Executar Script de Coleta
      run: python script_radar.py

    - name: Salvar alterações no GitHub
      run: |
        git config --global user.name 'Automacao GitHub'
        git config --global user.email 'actions@github.com'
        git add dados_mercado.csv
        git commit -m "Atualização automática de dados: $(date +'%Y-%m-%d')" || exit 0
        git push